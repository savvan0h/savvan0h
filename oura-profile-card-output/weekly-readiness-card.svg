<circle cx="170" cy="151.25" r="4" fill="#ffffff" />
<circle cx="260" cy="157.08333333333331" r="4" fill="#ffffff" />
<circle cx="350" cy="139.58333333333331" r="4" fill="#ffffff" />
<circle cx="440" cy="104.58333333333333" r="4" fill="#ffffff" />
<circle cx="530" cy="203.75" r="4" fill="#ffffff" />
<circle cx="620" cy="136.66666666666669" r="4" fill="#ffffff" />


