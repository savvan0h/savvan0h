          85 (Optimal)
        </text>
      
  </g>

  <!-- Main Line Chart Path -->
  <path d="M 80,125 L 170,131.36363636363637 L 260,105.9090909090909 L 350,134.54545454545456 L 440,156.8181818181818 L 530,115.45454545454545 L 620,214.0909090909091" fill="none" stroke="#ffffff" stroke-width="2"/>

  <!-- Data Points -->
  <circle cx="80" cy="125" r="4" fill="#ffffff" />
<circle cx="170" cy="131.36363636363637" r="4" fill="#ffffff" />
<circle cx="260" cy="105.9090909090909" r="4" fill="#ffffff" />
<circle cx="350" cy="134.54545454545456" r="4" fill="#ffffff" />
<circle cx="440" cy="156.8181818181818" r="4" fill="#ffffff" />
<circle cx="530" cy="115.45454545454545" r="4" fill="#ffffff" />
<circle cx="620" cy="214.0909090909091" r="4" fill="#ffffff" />


