<svg xmlns="http://www.w3.org/2000/svg" width="720" height="320" viewBox="0 0 720 320">
  <!-- Background -->
  <rect x="0" y="0" width="720" height="320" fill="#000000" />

  <!-- Title & Date Range -->
  <text x="20" y="40" font-size="22" fill="#ffffff" font-family="Arial, sans-serif">
    Sleep Score
  </text>
  <text x="20" y="70" font-size="18" fill="#cccccc" font-family="Arial, sans-serif">
    2026-03-03 → 2026-03-09
  </text>

  <!-- Chart Area -->
  <!-- Y-axis line -->
  <line x1="80" y1="90" x2="80" y2="230" stroke="#444444" stroke-width="1"/>
  <!-- X-axis line -->
  <line x1="80" y1="230" x2="620" y2="230" stroke="#444444" stroke-width="1"/>

  <!-- Dotted Threshold Lines & Labels -->
  <g id="extra-lines">
    
        <line x1="80" y1="165.55555555555554" x2="620" y2="165.55555555555554"
              stroke="#bbbbbb" stroke-width="1" stroke-dasharray="3,3" />
        <text x="630" y="169.55555555555554" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
          60 (Fair)
        </text>
      
        <line x1="80" y1="143.33333333333331" x2="620" y2="143.33333333333331"
              stroke="#bbbbbb" stroke-width="1" stroke-dasharray="3,3" />
        <text x="630" y="147.33333333333331" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
          70 (Good)
        </text>
      
        <line x1="80" y1="110" x2="620" y2="110"
              stroke="#bbbbbb" stroke-width="1" stroke-dasharray="3,3" />
        <text x="630" y="114" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
          85 (Optimal)
        </text>
      
  </g>

  <!-- Main Line Chart Path -->
  <path d="M 80,218.88888888888889 L 170,134.44444444444446 L 260,118.8888888888889 L 350,138.88888888888889 L 440,130 L 530,156.66666666666666 L 620,101.11111111111111" fill="none" stroke="#6B8EFF" stroke-width="2"/>

  <!-- Data Points -->
  <g fill="#ffffff">
    <circle cx="80" cy="218.88888888888889" r="4" fill="#ffffff" />
<circle cx="170" cy="134.44444444444446" r="4" fill="#ffffff" />
<circle cx="260" cy="118.8888888888889" r="4" fill="#ffffff" />
<circle cx="350" cy="138.88888888888889" r="4" fill="#ffffff" />
<circle cx="440" cy="130" r="4" fill="#ffffff" />
<circle cx="530" cy="156.66666666666666" r="4" fill="#ffffff" />
<circle cx="620" cy="101.11111111111111" r="4" fill="#ffffff" />

  </g>

  <!-- X-axis Tick Labels -->
  <g class="x-ticks">
    
      <text x="80" y="245" text-anchor="middle"
