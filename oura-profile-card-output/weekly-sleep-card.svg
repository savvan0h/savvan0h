        <text x="630" y="214.55555555555554" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
          60 (Fair)
        </text>
      
        <line x1="80" y1="171.66666666666666" x2="620" y2="171.66666666666666"
              stroke="#bbbbbb" stroke-width="1" stroke-dasharray="3,3" />
        <text x="630" y="175.66666666666666" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
