        </text>
      
        <line x1="80" y1="113.33333333333333" x2="620" y2="113.33333333333333"
              stroke="#bbbbbb" stroke-width="1" stroke-dasharray="3,3" />
        <text x="630" y="117.33333333333333" text-anchor="start"
              font-size="12" fill="#bbbbbb" font-family="Arial, sans-serif">
          85 (Optimal)
        </text>
      
  </g>

  <!-- Main Line Chart Path -->
  <path d="M 80,109.44444444444444 L 188,160 L 296,202.77777777777777 L 404,144.44444444444446 L 512,183.33333333333334 L 620,202.77777777777777" fill="none" stroke="#6B8EFF" stroke-width="2"/>

  <!-- Data Points -->
  <g fill="#ffffff">
    <circle cx="80" cy="109.44444444444444" r="4" fill="#ffffff" />
<circle cx="188" cy="160" r="4" fill="#ffffff" />
<circle cx="296" cy="202.77777777777777" r="4" fill="#ffffff" />
<circle cx="404" cy="144.44444444444446" r="4" fill="#ffffff" />
<circle cx="512" cy="183.33333333333334" r="4" fill="#ffffff" />
<circle cx="620" cy="202.77777777777777" r="4" fill="#ffffff" />

  </g>

